name: DB Preview Branch

# Neon branch-per-PR: a copy-on-write branch from prod schema per PR, migrated + seeded, torn down on
# close. Migrations run against the DIRECT (non-pooler) host so partition DDL + CREATE INDEX
# CONCURRENTLY work. Requires secrets: NEON_API_KEY, NEON_PROJECT_ID.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  create:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Neon branch
        id: branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - name: Migrate (direct host) + seed
        env:
          DATABASE_URL_DIRECT: ${{ steps.branch.outputs.db_url }}
          DATABASE_URL: ${{ steps.branch.outputs.db_url_pooled }}
        run: |
          pnpm db:migrate
          pnpm db:seed

  delete:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
